apiVersion: v1
kind: Service
metadata:
  name: frontend-app-td-service
spec:
  type: LoadBalancer
  selector:
    app: frontend-td-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-td-config
data:
  PROFESOR: "Juanvi"

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frontend-td-app-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
